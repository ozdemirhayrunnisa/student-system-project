            <span class="navbar-toggler-icon"></span>
          </button>
      
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ml-auto"><!-- ml-auto shifts nav items to right -->
              <li class="nav-item active">
                <a class="nav-link" href="/teacher-dashboard.html">Ana Sayfa</a>
              </li>
              <li class="nav-item active">
                <a class="nav-link" href="/create-course.html">Kurs Ekle</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/student-courses-selection.html">Onay Bekleyen Kurslar</a>

              <li class="nav-item">

      <div class="container mt-3">
        <form  id="course-form">
          <div class="row jumbotron box8">
            <div class="col-sm-12 mx-t3 mb-4">
              <h2 class="text-center text-info">Kurs Ekle</h2>
            </div>
            <div class="col-sm-12 form-group">
              <label for="firstName">Kurs Adı</label>
              <input type="text" class="form-control" name="courseName" id="courseName" placeholder="Lütfen kurs adını yazınız." required>
            </div>
            <div class="col-sm-12 form-group">
              <label for="courseCredits">Kurs Kredisi</label>
              <input type="number" class="form-control" id="courseCredits" name="courseCredits" min ="1" placeholder="Lütfen kurs kredisini yazınız"  required>
            
            </div>
            
            <div class="col-sm-12 form-group mb-0">
              <button id="submit_course" class="btn btn-primary float-right">Kaydet</button>
            </div>
      
          </div>
        </form>
      </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
