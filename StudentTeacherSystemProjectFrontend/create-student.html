<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli</title>
    <link rel="stylesheet" href="css/dashboard.css">  <!-- dashboard.css Bağlantısı -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel = "icon" href = "./imgs/student-system.jpg" type = "image/x-icon">

</head>
<body>

    <nav class="navbar navbar-expand-lg student_navbar">
        <div class="container"> <!-- centers Navbar elements in a container -->
          <h3 id="login-user-name"></h3>
          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
      
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ml-auto"><!-- ml-auto shifts nav items to right -->
                    <li class="nav-item active">
                      <a class="nav-link" href="/admin-dashboard.html">Ana Sayfa</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="/create-student.html">Öğrenci Ekle</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="/create-teacher.html">öğretmen Ekle</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" id="log-out">Çıkış Yap</a>
                    </li>
                    
                  </ul>
          </div>
          
        </div>
      </nav>
      <div class="container mt-3">
        <form  id="student-form">
          <div class="row jumbotron box8">
            <div class="col-sm-12 mx-t3 mb-4">
              <h2 class="text-center text-info">Öğrenci Kayıt</h2>
            </div>
            <div class="col-sm-12 form-group">
              <label for="firstName">Öğrenci Adı</label>
              <input type="text" class="form-control" name="firstName" id="firstName" placeholder="Lütfen öğrencinin adını yazınız." required>
            </div>
            <div class="col-sm-12 form-group">
              <label for="lastName">Öğrenci Soyadı</label>
              <input type="text" class="form-control" name="lastName" id="lastName" placeholder="Lütfen öğrenci soyadını yazınız" required>
            </div>
            <div class="col-sm-12 form-group">
              <label for="email">E-posta</label>
              <input type="email" class="form-control" name="email" id="email" placeholder="Lütfen Öğrenci e-postasını yazınız" required>
            </div>
            <div class="col-sm-12 form-group">
              <label for="password">Şifre</label>
              <input type="Password" name="password" class="form-control" id="password" placeholder="Öğrenci şifresini giriniz." required>
            </div>
            <div class="col-sm-12 form-group">
                <label for="major">Bölüm</label>
                <input type="text" class="form-control" name="major" id="major" placeholder="Lütfen öğrenci bölümünü yazınız" required>
              </div>
            <div class="col-sm-12 form-group mb-0">
              <button id="submit_student" class="btn btn-primary float-right">Kaydet</button>
            </div>
      
          </div>
        </form>
      </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script src="js/create-student.js"></script>  <!-- teacher-dashboard.js Bağlantısı -->
</body>
</html>
